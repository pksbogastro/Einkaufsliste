<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Einkaufs-Helfer GE</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #2196F3; --plan: #ff9800; --buy: #4CAF50; --danger: #f44336; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; padding-bottom: 80px; text-align: center; }
        .header { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.gekauft { opacity: 0.3; background: #e0e0e0; filter: grayscale(100%); }
        .bild-container { width: 100px; height: 100px; border-radius: 15px; overflow: hidden; margin-right: 15px; flex-shrink: 0; border: 1px solid #ddd; background: #eee; }
        .bild { width: 100%; height: 100%; object-fit: cover; }
        .info { flex-grow: 1; text-align: left; }
        .info h2 { margin: 0; font-size: 1.2rem; }
        .anzahl-box { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; margin: 5px 0; width: 100%; }
        .btn-mode { background: var(--primary); font-size: 1.1rem; }
        .btn-add { background: var(--buy); }
        .btn-pdf { background: #607d8b; }
        .btn-reset { background: var(--plan); }
        .hidden { display: none; }
        #fs-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #fs-overlay img { max-width: 90%; max-height: 90%; border: 3px solid white; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn btn-mode" id="modeBtn" onclick="toggleMode()">Wechseln zu: EINKAUFEN</button>
    <div id="planerControls">
        <button class="btn btn-add" onclick="addNewItem()">+ Neuer Artikel</button>
        <button class="btn btn-pdf" onclick="window.print()">Liste drucken / PDF</button>
        <button class="btn btn-reset" onclick="resetAll()">Alle auf 0 setzen</button>
    </div>
</div>

<div id="liste">Lade Liste...</div>
<div id="fs-overlay" onclick="this.style.display='none'"><img id="fs-img" src=""></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBFwrIf19q-yMSzcDkBRaLHPGMTwZjMay8",
      authDomain: "einkaufen-bpo1.firebaseapp.com",
      projectId: "einkaufen-bpo1",
      storageBucket: "einkaufen-bpo1.firebasestorage.app",
      messagingSenderId: "372799563406",
      appId: "1:372799563406:web:355b3554dd3d065d614bdf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentMode = localStorage.getItem('mode') || 'planung';

    function toggleMode() {
        currentMode = (currentMode === 'planung') ? 'einkauf' : 'planung';
        localStorage.setItem('mode', currentMode);
        renderAll();
    }

    function renderAll() {
        document.getElementById('modeBtn').innerText = currentMode === 'planung' ? 'Modus: PLANUNG (Tippen zum Wechseln)' : 'Modus: EINKAUFEN (Tippen zum Wechseln)';
        document.getElementById('planerControls').classList.toggle('hidden', currentMode === 'einkauf');
    }

    db.collection("artikel").onSnapshot((snapshot) => {
        const listDiv = document.getElementById('liste');
        listDiv.innerHTML = '';
        let items = [];
        snapshot.forEach(doc => items.push({id: doc.id, ...doc.data()}));
        items.sort((a,b) => a.name.localeCompare(b.name));

        items.forEach(item => {
            if (currentMode === 'einkauf' && (item.anzahl <= 0 || !item.anzahl)) return;

            const card = document.createElement('div');
            card.className = `card ${item.gekauft && currentMode === 'einkauf' ? 'gekauft' : ''}`;
            card.onclick = () => { if(currentMode === 'einkauf') db.collection("artikel").doc(item.id).update({gekauft: !item.gekauft}); };

            card.innerHTML = `
                ${currentMode === 'planung' ? `<div class="delete-btn" onclick="event.stopPropagation(); deleteItem('${item.id}')">✕</div>` : ''}
                <div class="bild-container" onclick="event.stopPropagation(); zoomImg('${item.bildUrl}')">
                    <img src="${item.bildUrl || 'https://via.placeholder.com/150'}" class="bild">
                </div>
                <div class="info">
                    ${currentMode === 'planung' 
                        ? `<strong>Name:</strong><br><input style="width:90%" value="${item.name}" onchange="updateField('${item.id}', 'name', this.value)">
                           <br><strong>Menge:</strong><br><input type="number" style="width:60px" value="${item.anzahl || 0}" onchange="updateField('${item.id}', 'anzahl', parseInt(this.value))">
                           <br><strong>Bild-URL:</strong><br><input style="width:90%" placeholder="Link hierher" value="${item.bildUrl || ''}" onchange="updateField('${item.id}', 'bildUrl', this.value)">`
                        : `<h2>${item.name}</h2><div class="anzahl-box">${item.anzahl} Stück</div>`
                    }
                </div>
            `;
            listDiv.appendChild(card);
        });
        renderAll();
    });

    function updateField(id, field, val) { db.collection("artikel").doc(id).update({[field]: val}); }
    function deleteItem(id) { if(confirm("Löschen?")) db.collection("artikel").doc(id).delete(); }
    function resetAll() { if(confirm("Alle Anzahlen auf 0?")) db.collection("artikel").get().then(s => s.forEach(d => d.ref.update({anzahl: 0, gekauft: false}))); }
    function zoomImg(url) { if(url) { document.getElementById('fs-img').src = url; document.getElementById('fs-overlay').style.display = 'flex'; } }
    function addNewItem() { 
        const n = prompt("Name des Artikels?"); 
        if(n) db.collection("artikel").add({name: n, anzahl: 1, gekauft: false, bildUrl: ""}); 
    }
</script>
</body>
</html>
