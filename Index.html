<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Einkaufs-Helfer GE</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #2196F3; --plan: #ff9800; --buy: #4CAF50; --danger: #f44336; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; padding-bottom: 80px; }
        
        .header { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; position: relative; border: 4px solid transparent; transition: 0.3s; }
        .card.gekauft { opacity: 0.4; background: #e0e0e0; }
        
        .bild-container { width: 120px; height: 120px; border-radius: 15px; overflow: hidden; margin-right: 20px; flex-shrink: 0; border: 1px solid #ddd; }
        .bild { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex-grow: 1; }
        .info h2 { margin: 0; font-size: 1.5rem; }
        .info .anzahl-box { font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        .delete-cross { position: absolute; top: -10px; right: -10px; background: var(--danger); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 3px solid white; }

        /* Buttons */
        .btn { padding: 12px 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-mode { background: var(--primary); width: 100%; font-size: 1.2rem; margin-bottom: 10px; }
        .btn-reset { background: var(--plan); }
        .btn-pdf { background: #607d8b; }
        .btn-add { background: var(--buy); width: 100%; margin-top: 10px; }

        /* Overlay für Vollbild-Bild */
        #fs-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #fs-overlay img { max-width: 95%; max-height: 95%; border: 5px solid white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn btn-mode" id="modeBtn" onclick="toggleMode()">Wechseln zu: EINKAUFEN</button>
    <div class="controls" id="planerControls">
        <button class="btn btn-reset" onclick="resetAll()">Alle auf 0</button>
        <button class="btn btn-pdf" onclick="exportPDF()">PDF Liste</button>
        <button class="btn btn-add" onclick="addNewItem()">+ Neuen Artikel hinzufügen</button>
    </div>
</div>

<div id="liste">Lade Daten...</div>

<div id="fs-overlay" onclick="this.style.display='none'"><img id="fs-img"></div>

<script>
    // DEINE KONFIGURATION
    const firebaseConfig = {
      apiKey: "AIzaSyBFwrIf19q-yMSzcDkBRaLHPGMTwZjMay8",
      authDomain: "einkaufen-bpo1.firebaseapp.com",
      projectId: "einkaufen-bpo1",
      storageBucket: "einkaufen-bpo1.firebasestorage.app",
      messagingSenderId: "372799563406",
      appId: "1:372799563406:web:355b3554dd3d065d614bdf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentMode = 'planung'; // oder 'einkauf'

    // Real-Time Listener: Lädt Daten sofort bei jeder Änderung
    db.collection("artikel").onSnapshot((snapshot) => {
        const items = [];
        snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        
        // Alphabetisch sortieren
        items.sort((a, b) => a.name.localeCompare(b.name));
        renderList(items);
    });

    function renderList(items) {
        const listDiv = document.getElementById('liste');
        listDiv.innerHTML = '';

        items.forEach(item => {
            // Im Einkaufsmodus nur Artikel mit Anzahl > 0 zeigen
            if (currentMode === 'einkauf' && item.anzahl <= 0) return;

            const card = document.createElement('div');
            card.className = `card ${item.gekauft && currentMode === 'einkauf' ? 'gekauft' : ''}`;
            
            card.innerHTML = `
                ${currentMode === 'planung' ? `<div class="delete-cross" onclick="deleteItem('${item.id}')">✕</div>` : ''}
                <div class="bild-container">
                    <img src="${item.bildUrl || 'https://via.placeholder.com/150'}" class="bild" 
                         ondblclick="zoomImg('${item.bildUrl}')" 
                         oncontextmenu="copyItem('${item.id}'); return false;">
                </div>
                <div class="info" onclick="handleCardClick('${item.id}', ${item.gekauft})">
                    ${currentMode === 'planung' 
                        ? `<input style="font-size:1.2rem; width:80%" value="${item.name}" onchange="updateField('${item.id}', 'name', this.value)">
                           <br><input type="number" style="width:50px; margin-top:10px" value="${item.anzahl}" onchange="updateField('${item.id}', 'anzahl', parseInt(this.value))">`
                        : `<h2>${item.name}</h2><div class="anzahl-box">${item.anzahl} Stück</div>`
                    }
                </div>
            `;
            listDiv.appendChild(card);
        });
    }

    // --- FUNKTIONEN ---

    function toggleMode() {
        currentMode = (currentMode === 'planung') ? 'einkauf' : 'planung';
        document.getElementById('modeBtn').innerText = currentMode === 'planung' ? 'Wechseln zu: EINKAUFEN' : 'Wechseln zu: PLANUNG';
        document.getElementById('planerControls').classList.toggle('hidden', currentMode === 'einkauf');
        location.reload(); // Kurzer Refresh zur Sicherheit
    }

    function handleCardClick(id, status) {
        if (currentMode === 'einkauf') {
            db.collection("artikel").doc(id).update({ gekauft: !status });
        }
    }

    function zoomImg(url) {
        if (currentMode === 'einkauf') {
            document.getElementById('fs-img').src = url;
            document.getElementById('fs-overlay').style.display = 'flex';
        }
    }

    function updateField(id, field, value) {
        db.collection("artikel").doc(id).update({ [field]: value });
    }

    function addNewItem() {
        const name = prompt("Name des Artikels?");
        const img = prompt("Bild-URL aus Galerie? (Z.B. von ImgBB)");
        if (name) {
            db.collection("artikel").add({ name: name, bildUrl: img, anzahl: 1, gekauft: false });
        }
    }

    function deleteItem(id) {
        if (confirm("Diesen Artikel wirklich löschen?")) {
            db.collection("artikel").doc(id).delete();
        }
    }

    function resetAll() {
        if (confirm("Alle Anzahlen auf 0 setzen?")) {
            db.collection("artikel").get().then(snapshot => {
                snapshot.forEach(doc => doc.ref.update({ anzahl: 0, gekauft: false }));
            });
        }
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Unsere Einkaufsliste", 20, 20);
        // Logik für PDF-Inhalt hier...
        doc.save("einkaufsliste.pdf");
    }

    function copyItem(id) {
        alert("Artikel-ID wurde für Kopie markiert (Simulation)");
        // Hier könnte man Logik für eine zweite Datei/Collection einbauen
    }
</script>
</body>
</html>
